apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: count-down-up-days
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/jacoloves/argocd-apps.git
    targetRevision: master
    path: apps/count-down-up-days
  destination:
    server: https://kubernetes.default.svc
    namespace: count-down-up-days
  syncPolicy:
    # 一時塩漬け中。auto-sync を意図的に外し、手動同期モードにしている。
    # 復帰時は automated.prune/selfHeal を元のテンプレに戻して `argocd app sync` を 1 回叩く。
    syncOptions:
      - CreateNamespace=true
