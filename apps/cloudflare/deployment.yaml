apiVersion: apps/v1
kind: Deployment
metadata:
  name: bulletin-cloudflared
  namespace: cloudflare
  labels:
    app: bulletin-cloudflared
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bulletin-cloudflared
  template:
    metadata:
      labels:
        app: bulletin-cloudflared
    spec:
      containers:
        - name: cloudflared
          image: cloudflare/cloudflared:2026.6.1
          args: ["tunnel", "--config", "/etc/cloudflared/config.yaml", "run"]
          livenessProbe:
            httpGet:
              path: /ready
              port: 2000
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: config
              mountPath: /etc/cloudflared/config.yaml
              subPath: config.yaml
            - name: creds
              mountPath: /etc/cloudflared/credentials.json
              subPath: credentials.json
      volumes:
        - name: config
          configMap:
            name: bulletin-tunnel-config
        - name: creds
          secret:
            secretName: bulletin-tunnel-credentials
