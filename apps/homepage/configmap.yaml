# homepage の設定ファイル群を ConfigMap として供給
# /app/config 配下に subPath マウントされる
apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage
  namespace: homepage
  labels:
    app.kubernetes.io/name: homepage
data:
  kubernetes.yaml: |
    mode: cluster

  settings.yaml: |
    title: shooonng homelab
    # K8s 連携で自動検出したサービスを services.yaml の上に出す
    theme: dark              # dark / light
    color: slate             # slate, gray, zinc, neutral, stone...
    headerStyle: boxed       # clean / boxed / underlined / boxedWidgets
    layout:
      Infra:
        style: row
        columns: 3
      Apps:
        style: column

  # ノード/クラスタのリソースウィジェット
  widgets.yaml: |
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: cluster
        nodes:
          show: true
          cpu: true
          memory: true
          showLabel: true
    - resources:
        backend: kubernetes
        expanded: true
        cpu: true
        memory: true
    - datetime:
      text_size: xl
      format:
        timeStyle: short
        dateStyle: long
    - openmeteo:                    # 無料・APIキー不要の天気
      latitude: 35.54               # 六郷土手あたり
      longitude: 139.70
      units: metric
      cache: 5
    - search:
        provider: duckduckgo
        target: _blank

  # 静的なサービスリンク（自動検出と併用可）
  services.yaml: |
    - Infra:
        - ArgoCD:
            href: https://argocd.k3s.local
            description: GitOps
            icon: argo-cd.png
        - Longhorn:
            href: https://longhorn.k3s.local
            description: Storage
            icon: longhorn.png
        - Grafana:
            href: https://grafana.k3s.local
            description: Dashboards
            icon: grafana.png

  bookmarks.yaml: |
    - Developer:
        - GitHub:
            - abbr: GH
              href: https://github.com/jacoloves/argocd-apps
              icon: github.png

  # K8s 連携時も空ファイルとしてマウントが必要なもの
  docker.yaml: ""
  custom.css: ""
  custom.js: ""
