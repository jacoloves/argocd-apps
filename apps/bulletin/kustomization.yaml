apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespace.yaml
  - backend-pvc.yaml
  - backend-deployment.yaml
  - backend-service.yaml
  - frontend-deployment.yaml
  - frontend-service.yaml
  - ingress.yaml
# デプロイするイメージタグはここで一元管理（更新時はこの newTag を変えて push）
images:
  - name: bulletin-backend
    newTag: "0.1.0"
  - name: bulletin-frontend
    newTag: "0.1.0"
